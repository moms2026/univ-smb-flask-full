{% extends "layout.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="container py-4">
  <div class="row mb-3">
    <div class="col">
      <h1>{{ title }}</h1>
      <p>{{ description }}</p>
    </div>
  </div>
  <div class="row">
    <div class="col-md-8">
      <div class="card">
        <div class="card-body">
          <form method="post">
            <div class="mb-3">
              <label class="form-label">Nom</label>
              <input class="form-control" name="name" required />
            </div>
            {% for field in fields %}
            <div class="mb-3">
              <label class="form-label">{{ field[1] }}</label>
              {% if field[0] == 'backend_servers' %}
                <input class="form-control" name="backend_servers" placeholder="serveur1,serveur2" required />
                <div class="form-text">Séparez plusieurs serveurs par des virgules.</div>
              {% else %}
                <input class="form-control" name="{{ field[0] }}" required />
              {% endif %}
            </div>
            {% endfor %}
            <button class="btn btn-primary" type="submit">Créer</button>
            <a class="btn btn-secondary" href="{{ url_for('list_items', kind=kind) }}">Annuler</a>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
